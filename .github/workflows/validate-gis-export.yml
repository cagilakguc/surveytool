name: Validate GIS export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm install --no-save --package-lock=false sql.js@1.14.1 tsx@4
      - run: npx tsx scripts/validate-gis-export.mjs
      - name: Validate Shapefile ZIP
        run: |
          python - <<'PY'
          import struct
          import zipfile

          path = "/tmp/surveytool-validation.zip"
          required = {
              "surveytool-validation.shp",
              "surveytool-validation.shx",
              "surveytool-validation.dbf",
              "surveytool-validation.prj",
              "surveytool-validation.cpg",
          }

          with zipfile.ZipFile(path) as archive:
              names = set(archive.namelist())
              assert required == names, (required, names)
              assert archive.testzip() is None

              shp = archive.read("surveytool-validation.shp")
              shx = archive.read("surveytool-validation.shx")
              dbf = archive.read("surveytool-validation.dbf")
              prj = archive.read("surveytool-validation.prj").decode("utf-8")
              cpg = archive.read("surveytool-validation.cpg").decode("utf-8")

              assert struct.unpack(">i", shp[0:4])[0] == 9994
              assert struct.unpack("<i", shp[28:32])[0] == 1000
              assert struct.unpack("<i", shp[32:36])[0] == 11
              assert struct.unpack(">i", shx[0:4])[0] == 9994
              assert struct.unpack("<i", shx[32:36])[0] == 11
              assert struct.unpack("<I", dbf[4:8])[0] == 3
              assert 'AUTHORITY["EPSG","2193"]' in prj
              assert cpg == "UTF-8"

          print("Shapefile ZIP components, headers, PointZ type, DBF count and CRS validated.")
          PY
