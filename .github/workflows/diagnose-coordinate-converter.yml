name: Diagnose coordinate converter build

on:
  push:
    branches:
      - agent/nz-coordinate-and-file-converter

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - id: build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const output = fs.readFileSync('build.log', 'utf8')
            const body = `### Coordinate converter build diagnostic\n\nExit code: ${{ steps.build.outputs.exit_code }}\n\n\`\`\`text\n${output.slice(-12000)}\n\`\`\``
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            })
            if (prs.data[0]) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs.data[0].number,
                body,
              })
            }
            if ('${{ steps.build.outputs.exit_code }}' !== '0') {
              core.setFailed('Build failed; diagnostic posted to pull request.')
            }
